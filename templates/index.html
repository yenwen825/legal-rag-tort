{% extends "layout.html" %}

{% block title %}
侵害配偶權判決 AI 檢索系統
{% endblock %}

{% block content %}
<!-- Main Content -->
<div class="container mb-5">
    <!-- Search Box -->
    <div class="row mb-4">
        <div class="col-lg-10 mx-auto">
            <div class="search-box">
                <h5 class="mb-3">
                    <i class="bi bi-pencil-square"></i> 輸入案情描述
                </h5>
                <form id="searchForm">
                    <div class="mb-3">
                        <textarea class="form-control" id="queryInput" rows="4" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">
                        <i class="bi bi-search"></i> 搜尋相似判決
                    </button>
                </form>

                <!-- Loading Indicator -->
                <div class="loading text-center mt-3" id="loading">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">搜尋中...</span>
                    </div>
                    <p class="mt-2">AI 正在分析案情...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Statistics Section -->
    <div id="statsSection" style="display: none;">
        <div class="row">
            <div class="col-lg-10 mx-auto">
                <div class="stats-card">
                    <h5 class="mb-3">
                        <i class="bi bi-bar-chart-fill"></i> 賠償金額統計
                    </h5>
                    <div class="row text-center">
                        <div class="col-md-3">
                            <h6 class="text-muted">中位數</h6>
                            <h4 class="text-primary" id="medianAmount">-</h4>
                        </div>
                        <div class="col-md-3">
                            <h6 class="text-muted">平均數</h6>
                            <h4 class="text-info" id="avgAmount">-</h4>
                        </div>
                        <div class="col-md-3">
                            <h6 class="text-muted">最低</h6>
                            <h4 style="color: #20c997;" id="minAmount">-</h4>
                        </div>
                        <div class="col-md-3">
                            <h6 class="text-muted">最高</h6>
                            <h4 style="color: #6610f2;" id="maxAmount">-</h4>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- AI Summary Section -->
<div id="aiSummarySection" style="display: none;">
    <div class="row mb-4">
        <div class="col-lg-10 mx-auto">
            <div class="stats-card" style="border-left: 5px solid #6f42c1; background-color: #f8f9fa;">
                <h5 class="mb-3" style="color: #6f42c1;">
                    <i class="bi bi-robot"></i> AI 判決分析
                </h5>
                <!-- Loading State -->
                <div id="aiLoading" class="text-center py-4">
                    <div class="spinner-grow spinner-grow-sm" style="color: #6f42c1;" role="status"></div>
                    <div class="spinner-grow spinner-grow-sm" style="color: #6f42c1;" role="status"></div>
                    <div class="spinner-grow spinner-grow-sm" style="color: #6f42c1;" role="status"></div>
                    <p class="text-muted mt-2 mb-0">正在仔細閱讀相似度最高的前 5 篇判決全文，產出深度分析...</p>
                </div>

                <!-- Result State -->
                <div id="aiResult" style="display: none;">
                    <p id="aiSummaryText"
                        style="line-height: 1.8; font-size: 1.1rem; color: #333; white-space: pre-wrap;"></p>
                    <div class="text-end text-muted small mt-3" id="aiTimeText"></div>
                </div>

                <!-- Error State -->
                <div id="aiError" class="text-danger" style="display: none;">
                    <i class="bi bi-exclamation-triangle"></i> AI 分析發生錯誤，請稍後重試。
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Results Section -->
<div id="resultsSection" style="display: none;">
    <div class="row">
        <div class="col-lg-10 mx-auto">
            <h5 class="mb-3">
                <i class="bi bi-file-earmark-text"></i> 搜尋結果
                <span class="badge bg-secondary" id="resultCount">0</span>
            </h5>
            <div id="results">
                <!-- Results will be inserted here dynamically -->
            </div>
        </div>
    </div>
</div>
</div>
{% endblock %}

{% block scripts %}
<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JavaScript -->
<script>
    document.getElementById('searchForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const query = document.getElementById('queryInput').value.trim();
        if (!query) {
            alert('請輸入查詢內容');
            return;
        }

        // Show loading
        document.getElementById('loading').classList.add('active');
        document.getElementById('statsSection').style.display = 'none';
        document.getElementById('aiSummarySection').style.display = 'none';
        document.getElementById('resultsSection').style.display = 'none';

        try {
            const response = await fetch('/api/search', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ query })
            });

            if (!response.ok) {
                throw new Error('搜尋失敗');
            }

            const data = await response.json();

            // Hide loading
            document.getElementById('loading').classList.remove('active');

            // Display stats
            displayStats(data.stats);

            // Display results
            displayResults(data.results);

            // Trigger AI generation
            if (data.results && data.results.length > 0) {
                triggerAiAnalysis(query, data.results);
            }

        } catch (error) {
            document.getElementById('loading').classList.remove('active');
            alert('搜尋時發生錯誤: ' + error.message);
        }
    });

    function displayStats(stats) {
        document.getElementById('medianAmount').textContent =
            stats.median_compensation != null ? `NT$ ${stats.median_compensation.toLocaleString()}` : '-';
        document.getElementById('avgAmount').textContent =
            stats.avg_compensation != null ? `NT$ ${Math.round(stats.avg_compensation).toLocaleString()}` : '-';
        document.getElementById('minAmount').textContent =
            stats.min_compensation != null ? `NT$ ${stats.min_compensation.toLocaleString()}` : '-';
        document.getElementById('maxAmount').textContent =
            stats.max_compensation != null ? `NT$ ${stats.max_compensation.toLocaleString()}` : '-';

        document.getElementById('statsSection').style.display = 'block';
    }

    function displayResults(results) {
        const resultsDiv = document.getElementById('results');
        const resultCount = document.getElementById('resultCount');

        if (!results || results.length === 0) {
            resultsDiv.innerHTML = '<p class="text-muted">沒有找到相關判決</p>';
            resultCount.textContent = '0';
            document.getElementById('resultsSection').style.display = 'block';
            return;
        }

        resultCount.textContent = results.length;

        resultsDiv.innerHTML = results.map((result, index) => `
                <div class="result-card">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h6 class="mb-0 fw-bold">
                            <a href="javascript:void(0)" onclick="viewDetail('${result.id}')" class="text-primary text-decoration-none" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">
                                ${result.court || '-'}｜${result.case_number || '-'}
                            </a>
                        </h6>
                    </div>
                    <p class="text-muted small mb-2">
                        <i class="bi bi-calendar-event"></i> ${result.date || 'N/A'} | 
                        <i class="bi bi-currency-dollar"></i> 賠償金額：${result.compensation != null ? result.compensation.toLocaleString() : 'N/A'} 元
                    </p>
                    <h6 class="mb-0">案情摘要：</h6>
                    <p class="mb-2">${result.facts || '-'}</p>
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <span class="text-secondary small fw-medium">
                            <i class="bi bi-bar-chart-line pe-1"></i> 相似度：${result.similarity ? (result.similarity * 100).toFixed(1) : 0}%
                        </span>
                        <button class="btn btn-sm btn-outline-primary" onclick="viewDetail('${result.id}')">
                            <i class="bi bi-eye"></i> 查看全文
                        </button>
                    </div>
                </div>
            `).join('');

        document.getElementById('resultsSection').style.display = 'block';
    }

    function viewDetail(judgmentId) {
        window.location.href = `/judgment/${judgmentId}`;
    }

    async function triggerAiAnalysis(query, results) {
        // Setup UI for Loading
        document.getElementById('aiSummarySection').style.display = 'block';
        document.getElementById('aiLoading').style.display = 'block';
        document.getElementById('aiResult').style.display = 'none';
        document.getElementById('aiError').style.display = 'none';

        // Extract top 5 judgment IDs
        const top5Ids = results.slice(0, 5).map(r => r.id);

        try {
            const response = await fetch('/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: query, result_ids: top5Ids })
            });

            if (!response.ok) {
                throw new Error('Analysis request failed');
            }

            const data = await response.json();

            // Update UI with Results
            document.getElementById('aiLoading').style.display = 'none';
            document.getElementById('aiSummaryText').textContent = data.summary;
            document.getElementById('aiResult').style.display = 'block';

            console.log(`[AI Analysis] 生成耗時: ${(data.analysis_time_ms / 1000).toFixed(2)} 秒`);

        } catch (error) {
            console.error("AI Analysis Error:", error);
            document.getElementById('aiLoading').style.display = 'none';
            document.getElementById('aiError').style.display = 'block';
        }
    }
</script>

{% endblock %}
